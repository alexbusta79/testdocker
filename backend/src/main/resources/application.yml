server:
  port: 8080
spring:
  application:
    name: supplier-management
  datasource:
    url: jdbc:h2:mem:inditexdb;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
springdoc:
  swagger-ui:
    url: /openapi/supplier-api.yaml
management:
  endpoints:
    web:
      exposure:
        include: health,info
external:
  country-service:
    base-url: ${EXTERNAL_COUNTRY_SERVICE_BASE_URL:http://localhost:8088}
    fail-open: ${EXTERNAL_COUNTRY_SERVICE_FAIL_OPEN:false}
